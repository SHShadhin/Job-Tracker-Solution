<html data-theme="light" lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job | Tracker</title>
  <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">

  <!-- Tailwind + daisy ui cdn -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <!-- icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    * {
      font-family: "Outfit", sans-serif;
    }
  </style>
</head>

<body class="min-h-screen bg-base-300 ">
<!-- header start -->
  <header class="w-[80%] mx-auto pt-6 ">
    <h1 class="text-4xl font-bold text-[#002C5C] py-4 ">Job Application Tracker</h1>
    <div class="grid grid-cols-3 gap-8">
      <div class="bg-white p-5 rounded-lg">
        <p>Total</p>
        <p id="total" class="text-[#002C5C] text-2xl">0</p>
      </div>
  
      <div class="bg-white p-5 rounded-lg">
        <p>Interview</p>
        <p id="interviewCount" class="text-[#10B981] text-2xl">0</p>
      </div>
  
      <div class="bg-white p-5 rounded-lg">
        <p>Reject</p>
        <p id="rejectCount" class="text-[#EF4444] text-2xl">0</p>
      </div>
    </div>
  </header>
  <hr class="my-10 w-[80%] mx-auto border-[#aaacb0c3]">
<!-- header end -->

<main>

</main>




<script src="script.js"></script>
</body>

</html>
